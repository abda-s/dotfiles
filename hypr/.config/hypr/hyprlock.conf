# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# Hyprlock config — CYBERPUNK EDITION
# Redesigned for < 1080p monitor resolutions
# Fonts: Zed Mono, Share Tech Mono (install via nerd-fonts or google-fonts)

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
$Scripts = $HOME/.config/hypr/scripts

# ══════════════════════════════════════════════
#  CYBERPUNK COLOR PALETTE (override as needed)
#  $cyberCyan   = rgba(0, 255, 255, 1)
#  $cyberPink   = rgba(255, 0, 128, 1)
#  $cyberYellow = rgba(255, 220, 0, 1)
#  $cyberDim    = rgba(180, 255, 255, 0.55)
# ══════════════════════════════════════════════

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

# ── BACKGROUND ─────────────────────────────────
background {
    monitor =
    path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_current

    color = rgb(0, 0, 0)

    blur_size = 2
    blur_passes = 3
    noise = 0.0200
    contrast = 1.4000
    brightness = 0.6000
    vibrancy = 0.3500
    vibrancy_darkness = 0.2
}

# ── TIME (HH:MM AM/PM — all in one label, no overlap) ──
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"
    color = rgba(0, 255, 255, 0.95)
    font_size = 100
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 60
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 10
    shadow_color = rgba(0, 255, 255, 0.45)
    shadow_boost = 1.5
}


# ── DATE ────────────────────────────────────────
label {
    monitor =
    text = cmd[update:18000000] echo "▸ $(date +'%A, %-d %B %Y') ◂"
    color = rgba(180, 255, 255, 0.65)
    font_size = 16
    font_family = JetBrainsMono Nerd Font Medium
    position = 0, -55
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 4
    shadow_color = rgba(0, 255, 255, 0.25)
}

# ── DECORATIVE SEPARATOR ────────────────────────
label {
    monitor =
    text = ══════════════════
    color = rgba(255, 0, 128, 0.30)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 0, -85
    halign = center
    valign = center
}

# ── USER ────────────────────────────────────────
label {
    monitor =
    text =  $USER
    color = rgba(255, 220, 0, 0.90)
    font_size = 20
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 225
    halign = center
    valign = bottom
    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(255, 220, 0, 0.35)
}

# ── INPUT FIELD ─────────────────────────────────
input-field {
    monitor =
    size = 280, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.25
    dots_center = true
    outer_color = rgb(0, 220, 220)
    inner_color = rgba(0, 10, 20, 0.85)
    capslock_color = rgb(255, 220, 0)
    font_color = rgb(0, 255, 255)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font Bold
    placeholder_text = <i><span foreground="##00ffff88"> AUTHENTICATE //</span></i>
    hide_input = false
    rounding = 2
    position = 0, 160
    halign = center
    valign = bottom
}

# ── KEYBOARD LAYOUT ─────────────────────────────
label {
    monitor =
    text = $LAYOUT
    color = rgba(180, 255, 255, 0.45)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, 130
    halign = center
    valign = bottom
}

# ── BATTERY (bottom-right) ───────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$($Scripts/Battery.sh)"
    color = rgba(0, 255, 255, 0.70)
    font_size = 13
    font_family = JetBrainsMono Nerd Font Bold
    position = -30, 52
    halign = right
    valign = bottom
}

# ── UPTIME (bottom-right, below battery) ────────
label {
    monitor =
    text = cmd[update:60000] echo "󰔚 "$(uptime -p || $Scripts/UptimeNixOS.sh)
    color = rgba(180, 255, 255, 0.50)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = -30, 28
    halign = right
    valign = bottom
}

# ── WEATHER (bottom-left) ────────────────────────
label {
    monitor =
    text = cmd[update:3600000] [ -f "$HOME/.cache/.weather_cache" ] && cat "$HOME/.cache/.weather_cache"
    color = rgba(255, 0, 128, 0.65)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 30, 15
    halign = left
    valign = bottom
}