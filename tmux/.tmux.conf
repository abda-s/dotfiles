set -sg escape-time 50

# Initial setup
set -g default-terminal "tmux-256color"
set -g status-keys vi

# --- KEY REMAPPING ---
set-option -g prefix C-j
unbind-key C-j
bind-key C-j send-prefix
set -g base-index 1

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind-key v split-window -h
bind-key h split-window -v

bind -n S-Left  previous-window
bind -n S-Right next-window

bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

bind-key y set-window-option synchronize-panes\; display-message "synchronize mode toggled."
bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."
bind-key L clear-history

# --- COPY MODE & MOUSE ---
setw -g mode-keys vi
unbind p
bind p paste-buffer
bind-key -T copy-mode-vi 'v' send -X begin-selection

set -g mouse on

# --- DRACULA THEME (Custom Pill Design + Stats) ---
# BG: #282a36 (Dark Navy)
# FG: #f8f8f2 (White)
# Purple: #bd93f9
# Pink:   #ff79c6
# Cyan:   #8be9fd
# Green:  #50fa7b
# Orange: #ffb86c
# Comment: #6272a4

set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#282a36,fg=#f8f8f2"
set -g status-left ""
set -g status-right-length 100
set -g status-left-length 100

# Window Status Formatting
# Active Window: Purple (#bd93f9) background, Dark Navy Text (#282a36)
setw -g window-status-current-format "#[fg=#bd93f9,bg=#282a36]#[fg=#282a36,bg=#bd93f9] #I  #W #[fg=#bd93f9,bg=#282a36]"

# Inactive Window: Comment Blue (#6272a4) background, White Text (#f8f8f2)
setw -g window-status-format "#[fg=#6272a4,bg=#282a36]#[fg=#f8f8f2,bg=#6272a4] #I  #W #[fg=#6272a4,bg=#282a36]"

# Status Right:
# 1. Session: Pink (#ff79c6)
# 2. CPU: Orange (#ffb86c)
# 3. Battery: Green (#50fa7b)
# 4. Time: Cyan (#8be9fd)
set -g status-right "#[fg=#ff79c6,bg=#282a36]#[fg=#282a36,bg=#ff79c6]  #S #[fg=#ff79c6,bg=#282a36] #[fg=#ffb86c,bg=#282a36]#[fg=#282a36,bg=#ffb86c]  #{cpu_percentage} #[fg=#ffb86c,bg=#282a36] #[fg=#50fa7b,bg=#282a36]#[fg=#282a36,bg=#50fa7b]  #{battery_percentage} #[fg=#50fa7b,bg=#282a36] #[fg=#8be9fd,bg=#282a36]#[fg=#282a36,bg=#8be9fd]  %H:%M #[fg=#8be9fd,bg=#282a36]"

# Pane borders
set -g pane-border-style "fg=#6272a4"
set -g pane-active-border-style "fg=#bd93f9"

# Message style
set -g message-style "bg=#bd93f9,fg=#282a36"

# --- PLUGINS ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# --- CLIPBOARD FIX (Force xclip) ---
# Explicitly pipe to xclip for system clipboard integration
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
